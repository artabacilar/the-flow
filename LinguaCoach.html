/* ---------- DASHBOARD BRIDGE ---------- */
function buildSummary(){
  const langs={};
  for(const l of ["de","es"]){
    const L=S.lang[l], C=CONTENT[l];
    const total=C.vocab.length+C.sentences.length+C.grammar.length;
    const learned=Object.values(L.cards).filter(c=>c.reps>=2).length;
    langs[l]={
      name:C.name,
      targetLevel:C.level,
      placementLevel:L.placement?L.placement.label:null,
      itemsLearned:learned,
      itemsTotal:total,
      masteryPct:Math.round(learned/total*100),
      skills:{ listening:round2(L.skill.listening), speaking:round2(L.skill.speaking),
               vocab:round2(L.skill.vocab), grammar:round2(L.skill.grammar) },
      doneToday:L.doneToday.date===todayStr()?L.doneToday.items:0
    };
  }
  return {
    app:"LinguaCoach", schema:1, updated:new Date().toISOString(),
    active:S.active,
    streak:S.streak, bestStreak:S.bestStreak, xp:S.xp, sessions:S.sessions,
    dailyGoal:S.profile.dailyGoalItems,
    todayItems:(S.lang[S.active].doneToday.date===todayStr()?S.lang[S.active].doneToday.items:0),
    languages:langs
  };
}

/* ---------- SRS (SM-2 lite) ---------- */
function cardId(type,lang,i){ return `${lang}:${type}:${i}`; }
function getCard(id){
  const L=S.lang[S.active];
  if(!L.cards[id]) L.cards[id]={ease:2.3,interval:0,due:0,reps:0,lapses:0,seen:0};
  return L.cards[id];
}
function reviewCard(id,grade){
  const c=getCard(id); c.seen++;
  if(grade===0){ c.reps=0; c.interval=0; c.lapses++; c.ease=Math.max(1.3,c.ease-0.2); }
  else{
    c.ease=Math.max(1.3, c.ease + (0.1 - (3-grade)*(0.08+(3-grade)*0.02)));
    c.reps++;
    if(c.reps===1) c.interval=grade===1?0.5:1;
    else if(c.reps===2) c.interval=grade===1?2:3;
    else c.interval=Math.round(c.interval*c.ease*(grade===3?1.3:1));
  }
  const dayMs=86400000;
  c.due = now() + Math.max(0.02, c.interval)*dayMs;
  save();
}
function dueCount(type){
  const L=S.lang[S.active], list=CONTENT[S.active][type];
  let n=0; for(let i=0;i<list.length;i++){ const c=L.cards[cardId(type,S.active,i)]; if(!c||c.due<=now()) n++; }
  return n;
}
function pickItems(type,count){
  const L=S.lang[S.active], list=CONTENT[S.active][type];
  const arr=list.map((it,i)=>({it,i,c:L.cards[cardId(type,S.active,i)]}));
  arr.sort((a,b)=>{
    const ad=a.c?a.c.due:0, bd=b.c?b.c.due:0;
    const aov=(!a.c||ad<=now())?0:1, bov=(!b.c||bd<=now())?0:1;
    if(aov!==bov) return aov-bov;
    return ad-bd;
  });
  return arr.slice(0,count);
}

/* ---------- skill / theme tracking ---------- */
function recordResult(skill,theme,correct){
  const L=S.lang[S.active];
  L.skill[skill] = clamp(L.skill[skill]*0.82 + (correct?1:0)*0.18, 0, 1);
  if(theme){ const te=L.themeErr[theme]||(L.themeErr[theme]={right:0,wrong:0});
    correct?te.right++:te.wrong++; }
  if(L.doneToday.date!==todayStr()) L.doneToday={date:todayStr(),items:0,byType:{}};
  L.doneToday.items++;
  save();
}
function bumpXP(n){ S.xp+=n; save(); }
function touchStreak(){
  const t=todayStr();
  if(S.lastActive===t) return;
  const y=new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(S.lastActive===y) S.streak++; else S.streak=1;
  S.lastActive=t; S.bestStreak=Math.max(S.bestStreak,S.streak); save();
}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

/* ---------- adaptive daily plan ---------- */
function buildPlan(){
  const L=S.lang[S.active];
  const styles=S.profile.styles;
  let w={listening:3, speaking:3, vocab:2, grammar:2};
  if(styles.includes("auditory")){ w.listening+=1; w.speaking+=1; }
  if(styles.includes("reading")){ w.vocab+=1; w.grammar+=1; }
  if(styles.includes("kinesthetic")){ w.speaking+=1; }
  const weakest=Object.entries(L.skill).sort((a,b)=>a[1]-b[1])[0][0];
  w[weakest]+=2;
  const target=Math.max(3, Math.round(S.profile.minutes/4));
  const order=Object.entries(w).sort((a,b)=>b[1]-a[1]);
  const plan=[]; let i=0;
  while(plan.length<target){ plan.push(order[i%order.length][0]); i++; if(i>40)break; }
  const modMap={listening:"dictation",speaking:"shadow",vocab:"vocab",grammar:"grammar"};
  return plan.map(sk=>({skill:sk,mod:modMap[sk]}));
}

let VOICES=[];
function loadVoices(){ VOICES=(typeof window!=="undefined"&&window.speechSynthesis)?speechSynthesis.getVoices():[]; }
if(typeof window!=="undefined" && window.speechSynthesis){ loadVoices(); speechSynthesis.onvoiceschanged=loadVoices; }
function speak(text,lang,rate){
  if(typeof window==="undefined" || !window.speechSynthesis){ return; }
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang; u.rate=rate||0.9;
  const v=VOICES.find(v=>v.lang===lang)||VOICES.find(v=>v.lang&&v.lang.slice(0,2)===lang.slice(0,2));
  if(v) u.voice=v;
  speechSynthesis.speak(u);
}
const SR = (typeof window!=="undefined") ? (window.SpeechRecognition||window.webkitSpeechRecognition||null) : null;
function recognize(lang,onResult,onErr){
  if(!SR){ onErr&&onErr("nosr"); return null; }
  const r=new SR(); r.lang=lang; r.interimResults=false; r.maxAlternatives=3;
  r.onresult=e=>{ const alts=[]; for(let i=0;i<e.results[0].length;i++) alts.push(e.results[0][i].transcript);
    onResult(alts); };
  r.onerror=e=>onErr&&onErr(e.error);
  try{ r.start(); }catch(e){ onErr&&onErr("start"); }
  return r;
}
function norm(s){ return s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"")
  .replace(/[^a-zñäöüß ]/gi,"").replace(/\s+/g," ").trim(); }
function lev(a,b){ const m=a.length,n=b.length,d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=0;j<=n;j++)d[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return d[m][n]; }
function similarity(a,b){ a=norm(a); b=norm(b); if(!a&&!b)return 1; const L=Math.max(a.length,b.length)||1;
  return clamp(1-lev(a,b)/L,0,1); }
function wordDiff(target,said){
  const tw=norm(target).split(" "), sw=new Set(norm(said).split(" "));
  return tw.map(w=>({w, ok:sw.has(w)}));
}

window.answerPlacement=(choice)=>{
  const q=PLACEMENT[PLC.lang][PLC.idx];
  const ok=choice===q.a; if(ok)PLC.correct++;
  PLC.byLvl[q.lvl].n++; if(ok)PLC.byLvl[q.lvl].c++;
  PLC.idx++;
  if(PLC.idx>=PLACEMENT[PLC.lang].length) finishPlacement();
  else renderPlacement();
};
function finishPlacement(){
  // estimate level: highest level with >=50% correct, requiring the level below to also be reasonable
  let est=1;
  for(let v=1;v<=4;v++){ const b=PLC.byLvl[v]; const rate=b.n? b.c/b.n : 0;
    if(rate>=0.5) est=v; else break; }
  const label=LEVEL_LABEL[est];
  const L=S.lang[PLC.lang];
  L.placement={ level:est, label, score:PLC.correct, of:PLACEMENT[PLC.lang].length, date:todayStr() };
  const base=LEVEL_BASE[est];
  // seed skills (keep listening/speaking a touch lower to reflect focus area)
  L.skill.listening=clamp(base-0.05,0,1); L.skill.speaking=clamp(base-0.08,0,1);
  L.skill.vocab=clamp(base,0,1); L.skill.grammar=clamp(base+0.02,0,1);
  save();
  const C=CONTENT[PLC.lang];
  const msg = est>=3 ? "Strong foundation — we'll push toward fluency with richer sentences and speaking work."
            : est===2 ? "Solid basics. We'll consolidate and steadily raise the difficulty."
            : "Great starting point — we'll build core vocab and structures fast.";
  root.innerHTML=`<div class="fade"><div class="card center coach">
    <div class="tiny muted">Your ${C.name} level</div>
    <div class="lvlbadge">${label}</div>
    <p class="muted">${PLC.correct}/${PLACEMENT[PLC.lang].length} correct · target ${C.level}</p>
    <p class="small" style="color:#dfe6f5">${msg}</p>
    <button class="btn grad" onclick="afterPlacement()">Open my coach →</button>
    ${PLC.lang==="de" && !S.lang.es.placement ? `<button class="btn ghost" style="margin-top:8px" onclick="startPlacement('es')">Take Spanish placement too</button>`:""}
  </div></div>`;
  PLC=null;
}

/* ---------- SESSION ENGINE ---------- */
let SESSION=null;
window.startModule=(mod)=>{
  let items, type;
  const per=Math.max(4,Math.round(S.profile.minutes/3));
  if(mod==="vocab"||mod==="pronounce"){ type="vocab"; items=pickItems("vocab",per); }
  else if(mod==="grammar"){ type="grammar"; items=pickItems("grammar",Math.max(4,Math.round(per*0.8))); }
  else { type="sentences"; items=pickItems("sentences",Math.max(4,Math.round(per*0.7))); }
  SESSION={mod,type,items,idx:0,correct:0,total:items.length,review:[]};
  renderSession();
};
// Record a missed item so we can review it at the end. Only misses are stored.
function logMiss(entry){ if(SESSION && !entry.ok) SESSION.review.push(entry); }
function endSession(){
  const {correct,total,mod,review}=SESSION;
  touchStreak(); S.sessions++; save();
  const pctv=Math.round(correct/Math.max(1,total)*100);
  const msg = pctv>=80?"Strong session. That's how fluency compounds. 🚀":
              pctv>=55?"Solid work — I'll resurface the tricky ones sooner.":

    <p class="tiny muted">How well did you know it?</p>
    <div class="grid2" style="gap:8px">
      <button class="btn" style="background:var(--bad)" onclick="gradeVocab(0)">Again</button>
      <button class="btn" style="background:var(--warn);color:#1a1200" onclick="gradeVocab(1)">Hard</button>
      <button class="btn" style="background:var(--acc)" onclick="gradeVocab(2)">Good</button>
      <button class="btn" style="background:var(--ok);color:#052318" onclick="gradeVocab(3)">Easy</button>
    </div>`;
};
window.gradeVocab=(g)=>{
  const s=SESSION, {it,i}=s.items[s.idx];
  reviewCard(cardId("vocab",S.active,i),g);
  const ok=g>=2; if(ok)s.correct++;
  recordResult("vocab",it.theme,ok);
  logMiss({ok,kind:"Vocabulary",prompt:it.t,answer:it.e,yours:(g===0?"Didn't know it":"Found it hard"),note:it.ex?`e.g. “${it.ex}”`:""});
  advance(ok);
};

/* --- GRAMMAR --- */
function renderGrammar(){
  const s=SESSION, {it}=s.items[s.idx];
  root.innerHTML=`<div class="fade">${sessionHeader()}
    <div class="card">
      <span class="tag">Grammar</span>
      <h2 style="margin:12px 0 16px;font-size:20px;line-height:1.4">${it.q}</h2>
      <div id="opts">
        ${it.opts.map(o=>`<button class="btn sec" style="margin-bottom:8px" onclick="answerGrammar('${esc(o)}')">${o}</button>`).join("")}
      </div>
      <div id="gfb"></div>
    </div></div>`;
}
window.answerGrammar=(choice)=>{
  const s=SESSION, {it,i}=s.items[s.idx];
  const ok=choice===it.a;
  if(ok)s.correct++;
  reviewCard(cardId("grammar",S.active,i), ok?2:0);
  recordResult("grammar",null,ok);
  logMiss({ok,kind:"Grammar",prompt:it.q,answer:it.a,yours:choice,note:it.why||""});
  document.querySelectorAll("#opts button").forEach(b=>{ b.disabled=true;
    if(b.textContent===it.a){ b.style.background="var(--ok)"; b.style.color="#052318"; }
    else if(b.textContent===choice) b.style.background="var(--bad)"; });
  document.getElementById("gfb").innerHTML=`<div class="feedback ${ok?'fb-ok':'fb-bad'}">
    ${ok?'✓ Correct.':'✗ Answer: <b>'+it.a+'</b>'}<div class="small" style="margin-top:6px;font-weight:400">${it.why}</div></div>
    <button class="btn grad" style="margin-top:12px" onclick="advance(${ok})">Next →</button>`;
};

/* --- SHADOWING --- */
function renderShadow(){
  const s=SESSION, {it}=s.items[s.idx]; const C=CONTENT[S.active];
  root.innerHTML=`<div class="fade">${sessionHeader()}
    <div class="card center">
      <span class="tag">Shadowing · ${it.theme}</span>
      <p class="tiny muted" style="margin-top:12px">Listen, then repeat it out loud</p>
      <div class="word" style="font-size:22px;line-height:1.4;margin:10px 0">${it.t}</div>
      <div class="small muted" style="margin-bottom:16px">${it.e}</div>
      <div class="row" style="justify-content:center;gap:14px;margin-bottom:20px">
        <button class="btn sec icon" onclick="speak('${esc(it.t)}','${C.lang}',0.8)">🐢 Slow</button>
        <div class="listen-btn" onclick="speak('${esc(it.t)}','${C.lang}',0.95)">🔊</div>
        <button class="btn sec icon" onclick="speak('${esc(it.t)}','${C.lang}',1)">Normal</button>
      </div>
      <div class="mic" id="mic" onclick="recShadow()">🎤</div>
      <p class="small muted" id="micHint" style="margin-top:12px">Tap the mic and say it</p>
      <div id="sfb"></div>
    </div></div>`;
  if(!SR){ document.getElementById("micHint").innerHTML=`<span class="muted">Speech scoring needs Chrome/Edge. On this browser you can still listen &amp; self-rate.</span>`; }
}
window.recShadow=()=>{
  const s=SESSION, {it,i}=s.items[s.idx]; const C=CONTENT[S.active];
  const mic=document.getElementById("mic"), hint=document.getElementById("micHint");
  if(!SR){ selfRate("sfb",it,i,"speaking"); return; }
  mic.classList.add("live"); hint.textContent="Listening… speak now";
  recognize(C.lang, (alts)=>{
    mic.classList.remove("live");
    let best=0,bestT=alts[0]; alts.forEach(a=>{const sc=similarity(it.t,a); if(sc>best){best=sc;bestT=a;}});
    const pctv=Math.round(best*100);
    const ok=best>=0.7; if(ok)s.correct++;
    reviewCard(cardId("sentences",S.active,i), best>=0.85?3:best>=0.7?2:best>=0.5?1:0);
    recordResult("speaking",it.theme,ok);
    logMiss({ok,kind:"Speaking",prompt:it.t,answer:it.t,yours:bestT||"(unclear)",note:it.e?`Means: ${it.e}`:"",score:pctv});
    const diff=wordDiff(it.t,bestT).map(w=>`<span class="${w.ok?'g':'b'}">${w.w}</span>`).join(" ");
    hint.textContent="";
    document.getElementById("sfb").innerHTML=`
      <div class="feedback ${ok?'fb-ok':pctv>=50?'fb-warn':'fb-bad'}">
        <div class="row between"><span>${ok?'Great pronunciation!':pctv>=50?'Close — keep at it':'Try again slower'}</span><b>${pctv}%</b></div>
        <div class="diff small" style="margin-top:8px;font-weight:400">I heard: ${diff}</div>
        <div class="tiny muted" style="margin-top:6px">Green = matched · red = missed/unclear</div>
      </div>
      <div class="row" style="gap:8px;margin-top:12px">
        <button class="btn ghost" onclick="recShadow()">↻ Retry</button>
        <button class="btn grad" onclick="advance(${ok})">Next →</button></div>`;
  }, (err)=>{
    mic.classList.remove("live");
    hint.innerHTML=`<span class="muted">${err==='not-allowed'?'Mic blocked — allow microphone access.':'Didn’t catch that.'}</span>`;
    selfRate("sfb",it,i,"speaking");
  });
};
function selfRate(fbId,it,i,skill){
  document.getElementById(fbId).innerHTML=`
    <p class="tiny muted" style="margin-top:14px">Rate yourself:</p>
    <div class="row" style="gap:8px">
      <button class="btn sec" onclick="manualGrade(${i},'${skill}',0)">Struggled</button>
      <button class="btn sec" onclick="manualGrade(${i},'${skill}',2)">OK</button>
      <button class="btn grad" onclick="manualGrade(${i},'${skill}',3)">Nailed it</button></div>`;
}
window.manualGrade=(i,skill,g)=>{
  const s=SESSION, {it}=s.items[s.idx]; const ok=g>=2; if(ok)s.correct++;
  reviewCard(cardId(s.type,S.active,i),g); recordResult(skill,it.theme,ok);
  logMiss({ok,kind:skill==="speaking"?"Speaking":"Practice",prompt:it.t,answer:it.t,yours:(g===0?"Struggled":"Self-rated OK"),note:it.e?`Means: ${it.e}`:""});
  advance(ok);
};

/* --- DICTATION --- */
function renderDictation(){
  const s=SESSION, {it}=s.items[s.idx]; const C=CONTENT[S.active];
  root.innerHTML=`<div class="fade">${sessionHeader()}
    <div class="card center">
      <span class="tag">Dictation · ${it.theme}</span>
      <p class="tiny muted" style="margin-top:12px">Listen and type what you hear</p>
      <div class="row" style="justify-content:center;gap:14px;margin:16px 0 18px">
        <button class="btn sec icon" onclick="speak('${esc(it.t)}','${C.lang}',0.75)">🐢 Slow</button>
        <div class="listen-btn" onclick="speak('${esc(it.t)}','${C.lang}',0.9)">🔊</div>
      </div>
      <input type="text" id="dic" placeholder="Type what you heard…" autocomplete="off" autocapitalize="off" spellcheck="false">
      <button class="btn grad" style="margin-top:12px" onclick="checkDictation()">Check</button>
      <button class="btn ghost sm" style="margin:8px auto 0" onclick="revealDict()">Show answer</button>
      <div id="dfb"></div>
    </div></div>`;
  setTimeout(()=>speak(it.t,C.lang,0.9),350);
  const inp=document.getElementById("dic"); inp.focus();
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")checkDictation();});
}
window.checkDictation=()=>{
  const s=SESSION, {it,i}=s.items[s.idx];
  const val=document.getElementById("dic").value;
  const sc=similarity(it.t,val); const pctv=Math.round(sc*100);
  const ok=sc>=0.82; if(ok)s.correct++;
  reviewCard(cardId("sentences",S.active,i), sc>=0.95?3:sc>=0.82?2:sc>=0.6?1:0);
  recordResult("listening",it.theme,ok);
  logMiss({ok,kind:"Listening",prompt:"(dictation)",answer:it.t,yours:val||"(blank)",note:it.e?`Means: ${it.e}`:"",score:pctv});
  const diff=wordDiff(it.t,val).map(w=>`<span class="${w.ok?'g':'b'}">${w.w}</span>`).join(" ");
  document.getElementById("dfb").innerHTML=`
    <div class="feedback ${ok?'fb-ok':pctv>=60?'fb-warn':'fb-bad'}">
      <div class="row between"><span>${ok?'Spot on!':pctv>=60?'Almost':'Listen again'}</span><b>${pctv}%</b></div>
      <div class="diff" style="margin-top:8px">${diff}</div>
      <div class="small muted" style="margin-top:6px">${it.e}</div>
    </div>
    <div class="row" style="gap:8px;margin-top:12px">
      <button class="btn ghost" onclick="renderDictation()">↻ Retry</button>
      <button class="btn grad" onclick="advance(${ok})">Next →</button></div>`;
};
window.revealDict=()=>{
  const s=SESSION, {it,i}=s.items[s.idx];
  reviewCard(cardId("sentences",S.active,i),1); recordResult("listening",it.theme,false);
  logMiss({ok:false,kind:"Listening",prompt:"(dictation)",answer:it.t,yours:"Revealed answer",note:it.e?`Means: ${it.e}`:""});
  document.getElementById("dfb").innerHTML=`<div class="feedback fb-warn">${it.t}<div class="small muted" style="margin-top:6px;font-weight:400">${it.e}</div></div>
    <button class="btn grad" style="margin-top:12px" onclick="advance(false)">Next →</button>`;
};

/* --- PRONUNCIATION LAB --- */
function renderPronounce(){
  const s=SESSION, {it}=s.items[s.idx]; const C=CONTENT[S.active];
  const word=it.t;
  root.innerHTML=`<div class="fade">${sessionHeader()}
    <div class="card center">
      <span class="tag">Pronunciation lab</span>
      <div class="word" style="margin:14px 0 4px">${word}</div>
      <div class="small muted" style="margin-bottom:16px">${it.e}</div>
      <div class="listen-btn" onclick="speak('${esc(word)}','${C.lang}',0.85)">🔊</div>
      <div class="mic" id="mic" style="margin-top:18px" onclick="recPron()">🎤</div>
      <p class="small muted" id="micHint" style="margin-top:12px">Tap, then say the word</p>
      <div id="pfb"></div>
    </div></div>`;
  if(!SR) document.getElementById("micHint").innerHTML=`<span class="muted">Recording needs Chrome/Edge — you can still listen &amp; self-rate.</span>`;
}
window.recPron=()=>{
  const s=SESSION, {it,i}=s.items[s.idx]; const C=CONTENT[S.active];
  const mic=document.getElementById("mic"),hint=document.getElementById("micHint");
  if(!SR){ selfRate("pfb",it,i,"speaking"); return; }
  mic.classList.add("live"); hint.textContent="Listening…";
  recognize(C.lang,(alts)=>{
    mic.classList.remove("live");
    let best=0; alts.forEach(a=>{const sc=similarity(it.t,a); if(sc>best)best=sc;});
    const pctv=Math.round(best*100); const ok=best>=0.75; if(ok)s.correct++;
    reviewCard(cardId("vocab",S.active,i), best>=0.9?3:best>=0.75?2:best>=0.5?1:0);
    recordResult("speaking",it.theme,ok); hint.textContent="";
    logMiss({ok,kind:"Pronunciation",prompt:it.t,answer:it.t,yours:pctv+"% match",note:it.e?`Means: ${it.e}`:"",score:pctv});
    document.getElementById("pfb").innerHTML=`<div class="feedback ${ok?'fb-ok':pctv>=50?'fb-warn':'fb-bad'}">
      <div class="row between"><span>${ok?'Clean!':'Keep shaping it'}</span><b>${pctv}%</b></div></div>
      <div class="row" style="gap:8px;margin-top:12px"><button class="btn ghost" onclick="recPron()">↻</button>
      <button class="btn grad" onclick="advance(${ok})">Next →</button></div>`;
  },(err)=>{ mic.classList.remove("live"); selfRate("pfb",it,i,"speaking"); });
};

/* ---------- PROGRESS ---------- */
function renderProgress(){
  const L=S.lang[S.active], C=CONTENT[S.active];
  const totalCards=C.vocab.length+C.sentences.length+C.grammar.length;
  const learned=Object.values(L.cards).filter(c=>c.reps>=2).length;
  const themes=Object.entries(L.themeErr).map(([t,v])=>({t,acc:v.right/Math.max(1,v.right+v.wrong),n:v.right+v.wrong}))
    .filter(x=>x.n>=1).sort((a,b)=>a.acc-b.acc);
  root.innerHTML=`<div class="fade">
    <div class="row between" style="margin-bottom:14px"><h1 style="margin:0">Progress</h1>${langSwitch()}</div>
    <div class="row" style="gap:10px">
      <div class="stat"><b>${learned}</b><span class="tiny muted">items learned</span></div>
      <div class="stat"><b>${S.sessions}</b><span class="tiny muted">sessions</span></div>
      <div class="stat"><b>${S.bestStreak}</b><span class="tiny muted">best streak</span></div>
    </div>
    <div class="card">
      <div class="row between"><b>${C.flag} ${C.name} mastery</b><span class="small muted">${learned}/${totalCards}</span></div>
      <div class="bar" style="margin-top:10px"><i style="width:${Math.round(learned/totalCards*100)}%"></i></div>
      <p class="tiny muted" style="text-transform:none;margin-top:10px">${L.placement?`Placement: <b>${L.placement.label}</b> (${L.placement.score}/${L.placement.of}) · `:""}An item counts as "learned" once you've recalled it correctly twice; spaced repetition keeps it fresh.</p>
    </div>
    <div class="card">
      <b>Skill balance</b>
      <div style="margin-top:10px">
      ${Object.entries(L.skill).map(([k,v])=>{const p=Math.round(v*100);const col=v<0.45?'var(--bad)':v<0.7?'var(--warn)':'var(--ok)';
        return `<div class="weak"><span class="small" style="width:92px;text-transform:capitalize">${k}</span>
        <div class="bar" style="flex:1"><i style="width:${p}%;background:${col}"></i></div>
        <span class="small muted" style="width:34px;text-align:right">${p}%</span></div>`;}).join("")}
      </div>
    </div>
    <div class="card">
      <b>Topics that trip you up</b>
      ${themes.length? `<div class="grid3" style="margin-top:12px">${themes.slice(0,6).map(x=>{
        const col=x.acc<0.5?'rgba(255,93,108,.25)':x.acc<0.75?'rgba(255,181,71,.25)':'rgba(55,211,153,.25)';
        const bc =x.acc<0.5?'var(--bad)':x.acc<0.75?'var(--warn)':'var(--ok)';
        return `<div class="heat" style="background:${col};border:1px solid ${bc};color:${bc};flex-direction:column">
          <span style="text-transform:capitalize">${x.t}</span><b>${Math.round(x.acc*100)}%</b></div>`;}).join("")}</div>`
        : `<p class="small muted" style="margin-top:10px">Do a few sessions and I'll map your weak topics here.</p>`}
    </div>
  </div>`;
}

/* ---------- SETTINGS ---------- */
function renderSettings(){
  const styleNames={auditory:"By ear",reading:"By reading",kinesthetic:"By doing",visual:"By patterns"};
  const de=S.lang.de.placement, es=S.lang.es.placement;
  root.innerHTML=`<div class="fade"><h1>Settings</h1>
    <div class="card">
      <b>Main language</b>
      <div class="row" style="gap:8px;margin-top:10px">
        ${["de","es"].map(l=>`<button class="chip ${S.active===l?'on':''}" onclick="switchLang('${l}')">${CONTENT[l].flag} ${CONTENT[l].name}</button>`).join("")}
      </div>
    </div>
    <div class="card">
      <b>Placement level</b>
      <p class="small muted" style="margin:.4em 0 10px">German: <b>${de?de.label+" ("+de.score+"/"+de.of+")":"not taken"}</b> · Spanish: <b>${es?es.label+" ("+es.score+"/"+es.of+")":"not taken"}</b></p>
      <div class="row" style="gap:8px">
        <button class="btn sec sm" onclick="startPlacement('de')">${de?"Retake":"Take"} 🇩🇪</button>
        <button class="btn sec sm" onclick="startPlacement('es')">${es?"Retake":"Take"} 🇪🇸</button>
      </div>
    </div>
    <div class="card">
      <div class="row between"><b>Daily time</b><span class="small muted">${S.profile.minutes} min</span></div>
      <div class="grid2" style="margin-top:10px">
        ${[10,15,20,30].map(m=>`<button class="chip ${S.profile.minutes===m?'on':''}" onclick="setMin(${m})">${m} min</button>`).join("")}
      </div>
    </div>
    <div class="card">
      <b>Learning style</b>
      <p class="small muted">${S.profile.styles.map(s=>styleNames[s]).join(" · ")||"—"}</p>
      <p class="tiny muted" style="text-transform:none">Your coach weights exercises toward these.</p>
    </div>
    <div class="card">
      <b>Daily item goal</b>
      <div class="row" style="gap:8px;margin-top:10px">
        ${[12,20,30].map(g=>`<button class="chip ${S.profile.dailyGoalItems===g?'on':''}" onclick="setGoal(${g})">${g}</button>`).join("")}
      </div>
    </div>
    <div class="card">
      <b>📊 Life dashboard &amp; data</b>
      <p class="small muted" style="margin:.4em 0 10px">This app publishes a live progress summary that your life dashboard can read (key <code>${SHARED_KEY}</code> + a <code>life-dashboard</code> broadcast channel). Export a full backup anytime.</p>
      <div class="row" style="gap:8px">
        <button class="btn sec sm" onclick="exportJSON()">⬇ Export backup</button>
        <button class="btn sec sm" onclick="document.getElementById('imp').click()">⬆ Import</button>
        <button class="btn sec sm" onclick="publishSummary();alert('Progress pushed to dashboard feed ✓')">↻ Push now</button>
      </div>
      <input id="imp" type="file" accept="application/json" style="display:none" onchange="if(this.files[0])importJSONFile(this.files[0])">
    </div>
    <div class="card">
      <b>Voice check</b>
      <p class="small muted">${(typeof window!=='undefined'&&window.speechSynthesis)?"Text-to-speech ready.":"⚠️ TTS unavailable."} ${SR?"Speech recognition ready (pronunciation scoring on).":"⚠️ Speech recognition needs Chrome or Edge — you'll self-rate speaking."}</p>
      <button class="btn sec sm" onclick="speak(S.active==='de'?'Hallo, sprichst du Deutsch?':'Hola, ¿hablas español?',CONTENT[S.active].lang,0.9)">🔊 Test voice</button>
    </div>
    <div class="card">
      <b>Coming later</b>
      <p class="small muted">Russian (once German &amp; Spanish are cruising) and a piano-composition coach for rhythms, melodies &amp; writing your own music. Ask anytime to start those.</p>
    </div>
    <button class="btn ghost" onclick="resetAll()" style="color:var(--bad);border-color:rgba(255,93,108,.4)">Reset all progress</button>
  </div>`;
}
window.setMin=m=>{S.profile.minutes=m;save();renderSettings();};
window.setGoal=g=>{S.profile.dailyGoalItems=g;save();renderSettings();};
window.resetAll=()=>{ if(confirm("Erase all progress and start over?")){ localStorage.removeItem(LS_KEY); localStorage.removeItem(SHARED_KEY); S=blankState(); lcCloudSave(JSON.stringify(S)); onbStep=0; onbData={styles:[],minutes:15}; VIEW="dashboard"; render(); } };

/* ---------- utils ---------- */
function esc(s){ return String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/\n/g," "); }

/* boot */
if(typeof document!=="undefined"){ render(); publishSummary(); }
</script>
</body>
</html>
